<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">API and Local both connect to AppService. Session manager is added above API as a sub-component. AppService connects to DataContainer, DataPipeline, DataLoader and DatasetDownloader along the main spine. AppService also branches down to BayesianScorer, DataFilter, Validator, and StateStore. db/ is consumed independently by API and AppService.</desc>
